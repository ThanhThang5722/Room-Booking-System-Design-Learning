server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip — giảm payload ~70% cho HTML/JS/CSS
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_comp_level 6;

    # Security headers — chuẩn cho production SPA
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Static assets cache aggressively (Vite gắn hash vào tên file → không lo stale)
    location ~* \.(?:js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # API → backend container (qua docker network)
    # Frontend container là single entrypoint; SPA gọi /api/... → nginx forward
    # tới backend:8080. Browser KHÔNG bao giờ cần kết nối thẳng tới backend.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API có thể chậm (booking flow ~150ms p99) — cho headroom
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Health endpoint riêng cho frontend container (cho docker healthcheck)
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback — route phía client (React Router) cần index.html cho mọi path.
    # try_files: thử file thật trước, không có thì serve index.html → React xử lý route.
    location / {
        try_files $uri $uri/ /index.html;

        # HTML không cache (để deploy mới được pick up ngay)
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}

services:
  # ===== PostgreSQL =====
  postgres:
    image: postgres:16-alpine
    container_name: booking-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-booking}
      POSTGRES_USER: ${DB_USER:-booking}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-booking_pwd}
    # Trong production, comment dòng ports — chỉ truy cập qua network nội bộ.
    # Để mở ở dev cho psql/DBeaver/PgAdmin connect dễ.
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-booking} -d ${DB_NAME:-booking}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [app-network]

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    container_name: booking-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [app-network]

  # ===== RabbitMQ =====
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: booking-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [app-network]

  # ===== Backend =====
  backend:
    build:
      context: ./booking-backend
    image: ${BACKEND_IMAGE:-booking-backend:local}
    container_name: booking-backend
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-booking}
      DB_USER: ${DB_USER:-booking}
      DB_PASSWORD: ${DB_PASSWORD:-booking_pwd}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      JWT_SECRET: ${JWT_SECRET:-change-me-this-must-be-at-least-32-characters-long-secret-key}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "8080:8080"   # Production có thể bỏ port này (nginx frontend là single entrypoint)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    networks: [app-network]

  # ===== Frontend (nginx serving SPA + reverse proxy /api → backend) =====
  frontend:
    build:
      context: ./booking-frontend
    image: ${FRONTEND_IMAGE:-booking-frontend:local}
    container_name: booking-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks: [app-network]

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge

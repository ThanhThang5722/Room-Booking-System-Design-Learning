server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: booking-backend

  # ---- PostgreSQL ----
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:booking}
    username: ${DB_USER:booking}
    password: ${DB_PASSWORD:booking_pwd}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      # validate: không cho Hibernate auto-create table — schema do Flyway quản lý
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
          # Buộc Instant đọc/ghi vào column "TIMESTAMP" (không tz) thay vì "TIMESTAMPTZ"
          # để khớp với schema Flyway tạo ra.
          preferred_instant_jdbc_type: TIMESTAMP
        format_sql: true
    open-in-view: false   # tránh anti-pattern "OSIV" trong Spring Boot

  # ---- Flyway: tự động chạy V1, V2, V3, ... khi app khởi động ----
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ---- Redis ----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # ---- RabbitMQ (Phase 3 dùng) ----
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

# ---- App config (custom) ----
app:
  jwt:
    # Lưu ý: secret phải >= 32 ký tự (256 bit) cho HS256
    secret: ${JWT_SECRET:change-me-this-must-be-at-least-32-characters-long-secret-key}
    # access token expire 1 hour (3600000 ms)
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    issuer: booking-backend
  admin:
    # Override qua env trong production (ADMIN_EMAIL, ADMIN_PASSWORD)
    email: ${ADMIN_EMAIL:admin@example.com}
    password: ${ADMIN_PASSWORD:admin123}

# ---- Actuator: expose /actuator/health cho healthcheck ----
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.booking: DEBUG
    org.hibernate.SQL: DEBUG
